<section id="achievements" class="section">
  <div class="container">
    <div class="section-header" appScrollReveal>
      <div class="section-tag">Achievements</div>
      <h2>Highlights & <span>Milestones</span></h2>
      <p>A snapshot of key accomplishments that define my professional identity and growth mindset.</p>
    </div>

    <div class="achievements__grid">
      @for (item of achievements; track item.title; let i = $index) {
        <div class="achievement-card card" appScrollReveal [revealDelay]="i * 0.08">
          <div class="achievement-icon" [style.background]="item.color + '18'" [style.border-color]="item.color + '44'">
            <i [class]="item.icon" [style.color]="item.color"></i>
          </div>
          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
